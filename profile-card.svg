<svg width="800" height="360" style="user-select: none; -webkit-user-drag: none;">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', system-ui, sans-serif;
    }
    svg {
      position: relative;
      width: 800px;
      height: 360px;
      background-color: transparent;
      border-radius: 24px;
      overflow: hidden;
    }
    .glass-card {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-sizing: border-box;
      width: 720px;
      height: 280px;
      background-color: rgba(255, 255, 255, 0.03);
      border-radius: 32px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 40px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      gap: 40px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .orb1 { animation: move-orb-1 12s infinite ease-in-out; }
    .orb2 { animation: move-orb-2 15s infinite ease-in-out; }
    @keyframes move-orb-1 {
      0% { transform: translate(0px, 0px) scale(1); }
      33% { transform: translate(60px, -40px) scale(1.1); }
      66% { transform: translate(-30px, 50px) scale(0.9); }
      100% { transform: translate(0px, 0px) scale(1); }
    }
    @keyframes move-orb-2 {
      0% { transform: translate(0px, 0px) scale(1); }
      33% { transform: translate(-50px, 30px) scale(1.2); }
      66% { transform: translate(40px, -60px) scale(0.8); }
      100% { transform: translate(0px, 0px) scale(1); }
    }
    .spin { animation: spin 15s linear infinite; }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
  <foreignObject width="800" height="360" x="0" y="0">
    <div style="position:relative; width:800px; height:360px; background:#0a0a0c; border-radius:24px; overflow:hidden; font-family:Inter, system-ui, sans-serif;">
      <!-- Fluid Background -->
      <div style="position:absolute; inset:0; opacity:0.4;">
        <img src="https://github.com/ikevin127/ikevin127/blob/main/profile.jpeg" style="width:100%; height:100%; object-fit:cover;"/>
      </div>
      <!-- Orbs -->
      <svg width="800" height="360" style="position:absolute; top:0; left:0;">
        <defs>
          <radialGradient id="grad1" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#fd166b" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="#fd166b" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="grad2" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <circle class="orb1" cx="200" cy="100" r="250" fill="url(#grad1)"/>
        <circle class="orb2" cx="600" cy="260" r="300" fill="url(#grad2)"/>
      </svg>
      <!-- Glass Card -->
      <div style="position:absolute; top:50%;  left:50%; transform:translate(-50%, -50%); box-sizing:border-box; width:720px; height:280px; padding:40px; background:rgba(255,255,255,0.03); border-radius:32px; border:1px solid rgba(255,255,255,0.1); display:flex; align-items:center; gap:40px; backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);">
        <div style="position: relative; display: flex; justify-content: center; align-items: center; padding: 4px; border-radius: 36px; background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.05));">
          <div class="spin" style="z-index: 0;position: absolute;display: flex; justify-content: center; align-items: center; padding: 4px; border-radius: 36px; background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.05));">
            <span style="width: 140px; height: 140px; border-radius: 32px;"/>
          </div>
          <img 
              src="profile.jpeg"
              width="140" 
              height="140" 
              style="z-index:0; width: 140px; height: 140px; border-radius: 32px;"/>
        </div>
        <div style="flex: 1;">
          <div style="font-size: 12px; font-weight: bold; color: #fff; letter-spacing: 1.5px; margin-bottom: 4px; text-decoration: underline;">
            <a href="https://github.com/ikevin127" target="_blank" style="color: inherit; text-decoration: inherit;">@ikevin127</a>
          </div>
          <h1 style="font-size: 48px; color: #fff; margin: 0 0 8px 0; font-weight: 800; letter-spacing: -1.5px;">
            Kevin Brian Bader
          </h1>
          <p style="font-size: 18px; color: rgba(255,255,255,0.8); margin: 0; line-height: 1.4;">
            Software Engineer at <a href="https://github.com/Expensify" target="_blank" style="color: inherit; font-weight: bold; text-decoration: underline;">@Expensify</a> | OSS Contributor
          </p>
          <div style="display: flex; gap: 10px; margin-top: 24px; flex-wrap: wrap;">
            <div style="display: flex; align-items: center; gap: 4px; background: rgba(255,255,255,0.05); padding: 6px 14px; border-radius: 10px; color: #fff; font-size: 13px; border: 1px solid rgba(255,255,255,0.1);"><img alt="React" src="https://github.com/ikevin127/ikevin127/blob/main/react.svg"/> React.js</div>
            <div style="display: flex; align-items: center; gap: 4px; background: rgba(255,255,255,0.05); padding: 6px 14px; border-radius: 10px; color: #fff; font-size: 13px; border: 1px solid rgba(255,255,255,0.1);"><img alt="Next" src="https://github.com/ikevin127/ikevin127/blob/main/next.svg"/>Next.js</div>
            <div style="display: flex; align-items: center; gap: 4px; background: rgba(255,255,255,0.05); padding: 6px 14px; border-radius: 10px; color: #fff; font-size: 13px; border: 1px solid rgba(255,255,255,0.1);"><img alt="TypeScript" src="https://github.com/ikevin127/ikevin127/blob/main/ts.svg"/>TypeScript</div>
            <div style="display: flex; align-items: center; gap: 4px; background: rgba(255,255,255,0.05); padding: 6px 14px; border-radius: 10px; color: #fff; font-size: 13px; border: 1px solid rgba(255,255,255,0.1);"><img alt="Python" src="https://github.com/ikevin127/ikevin127/blob/main/python.svg"/>Python</div>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
